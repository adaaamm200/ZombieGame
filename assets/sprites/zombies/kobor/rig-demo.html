<!DOCTYPE html>
<html lang="hu">
<head>
<meta charset="UTF-8">
<title>Zombi Kronika - Part-rig demo v2 (kar + hangolas)</title>
<style>
  html,body{margin:0}
  body{background:#0b0f16;color:#e6e6e6;font-family:system-ui,sans-serif;
       display:flex;flex-direction:column;align-items:center;gap:12px;padding:18px}
  h2{margin:2px 0 0;font-weight:600}
  .sub{font-size:13px;color:#7f8894;max-width:560px;text-align:center;margin:0}
  canvas{background:#141a24;border:1px solid #263041;border-radius:10px;touch-action:none}
  .row{display:flex;gap:8px;flex-wrap:wrap;justify-content:center}
  button{padding:9px 16px;border:1px solid #2c3646;border-radius:8px;background:#1b2330;
         color:#dfe6ef;font-size:14px;cursor:pointer}
  button:hover{background:#243044}
  button.kill{border-color:#5a1f1f;background:#2a1414;color:#ffb3b3}
  button.on{border-color:#2f6f4f;background:#163024;color:#9ff0c4}
  #hp{font-size:13px;color:#8fb98f;font-variant-numeric:tabular-nums}
  .panel{display:grid;grid-template-columns:auto 150px 44px;gap:6px 10px;align-items:center;
         background:#121824;border:1px solid #222c3a;border-radius:10px;padding:12px 16px;font-size:13px}
  .panel label{color:#9aa4b2;justify-self:end}
  .panel output{color:#dfe6ef;font-variant-numeric:tabular-nums}
  input[type=range]{width:150px;accent-color:#4f9e6f}
</style>
</head>
<body>
  <h2>Part-rig demo v2 — kar + élő hangolás</h2>
  <p class="sub">5 testrész (fej, törzs, kar, 2 láb). A csúszkákkal élőben hangold az
     érzést, aztán küldj screenshotot. Kattints a zombira = találat.</p>
  <div class="row">
    <button onclick="game.reset()">Reset</button>
    <button id="walkBtn" onclick="game.toggleWalk()">Járás</button>
    <button onclick="game.hit(25)">Találat (-25 HP)</button>
    <button class="kill" onclick="game.hit(200)">Halálos találat</button>
  </div>
  <div id="hp">HP: 100</div>
  <canvas id="c" width="520" height="360"></canvas>
  <div class="panel" id="panel"></div>
  <p id="status" class="sub">Betöltés…</p>

<script>
const canvas=document.getElementById('c'), ctx=canvas.getContext('2d');
const statusEl=document.getElementById('status'), hpEl=document.getElementById('hp');
const walkBtn=document.getElementById('walkBtn');

const COL={bloodDark:'#5a0808',blood:'#8a0f0f',bloodHot:'#c81414',toxic:'#6ee335',shadow:'rgba(0,0,0,0.35)'};

// ---- Elohangolo parameterek (csuszkak allitjak) ----
const TUNE={ walkSpeed:7.5, legSwing:20, armSwing:15, blood:1.0, force:1.0, gravity:900 };
const SLIDERS=[
  ['walkSpeed','Lépéssebesség',3,14,0.5],
  ['legSwing','Láblengés (°)',5,35,1],
  ['armSwing','Karlengés (°)',0,30,1],
  ['blood','Vér mennyiség',0.3,2.5,0.1],
  ['force','Szétrepülés erő',0.5,2.2,0.1],
  ['gravity','Gravitáció',400,1400,20],
];
(function buildPanel(){
  const p=document.getElementById('panel');
  for(const [key,label,min,max,step] of SLIDERS){
    const l=document.createElement('label'); l.textContent=label;
    const i=document.createElement('input'); i.type='range'; i.min=min; i.max=max; i.step=step; i.value=TUNE[key];
    const o=document.createElement('output'); o.textContent=TUNE[key];
    i.oninput=()=>{ TUNE[key]=parseFloat(i.value); o.textContent=i.value; };
    p.append(l,i,o);
  }
})();

// ---- Part-rig geometria (1024-es kepterben) ----
const ANCHOR={x:497,y:920};
const PIV={ neck:{x:628,y:236}, shoulder:{x:560,y:415}, hipL:{x:455,y:618}, hipR:{x:545,y:618} };
const CENT={ head:{x:563,y:173}, torso:{x:512,y:440}, arm_front:{x:591,y:524}, leg_left:{x:371,y:763}, leg_right:{x:617,y:764} };
const DISPLAY_H=210;
let S=0.2;

const PART_NAMES=['head','torso','arm_front','leg_left','leg_right'];
const img={}, mask={};
let loaded=0, ready=false;
function makeMask(im){
  const m=document.createElement('canvas'); m.width=im.naturalWidth; m.height=im.naturalHeight;
  const mx=m.getContext('2d'); mx.drawImage(im,0,0);
  mx.globalCompositeOperation='source-in'; mx.fillStyle='#ffffff'; mx.fillRect(0,0,m.width,m.height); return m;
}
PART_NAMES.forEach(n=>{
  const im=new Image();
  im.onload=()=>{ img[n]=im; mask[n]=makeMask(im); if(++loaded===PART_NAMES.length){
    S=DISPLAY_H/(920-109); ready=true; statusEl.textContent='Kész. Járás / Találat / Halálos találat.'; }};
  im.onerror=()=>{ statusEl.textContent='Hiba: nem találom a parts_rig/'+n+'.png-t.'; };
  im.src='./parts_rig/'+n+'.png';
});

const GROUND_Y=310;
const rnd=(a,b)=>a+Math.random()*(b-a), clamp=(v,a,b)=>v<a?a:v>b?b:v;
const damp=(c,t,r,dt)=>c+(t-c)*(1-Math.exp(-r*dt));
const D2R=Math.PI/180;

let hitstop=0, shakeMag=0, shakeT=0, shakeDur=0, flash=0, vignette=0;
let particles=[], decals=[], dmgNums=[], parts=[], dust=[];

const z={ x:150, hp:100, alive:true, walking:false, facing:1,
  phase:0, sx:1, sy:1, bobY:0, lean:0, breathe:0,
  kbx:0, kbvx:0, legLA:0, legRA:0, headA:0, armA:0 };

function toScreen(ix,iy){
  return { x: z.x + z.kbx + z.facing*(ix-ANCHOR.x)*S,
           y: GROUND_Y + z.bobY + (iy-ANCHOR.y)*S };
}

function spawnBlood(x,y,dirX,count,power){
  count=Math.round(count*TUNE.blood);
  for(let i=0;i<count;i++){
    const ang=Math.atan2(-0.7,dirX)+rnd(-1,1), spd=rnd(60,60+power), tox=Math.random()<0.12;
    particles.push({x,y,vx:Math.cos(ang)*spd+dirX*rnd(10,40),vy:Math.sin(ang)*spd-rnd(20,90),
      life:rnd(0.5,1.1),max:1,r:rnd(2,5.5),grav:TUNE.gravity*rnd(0.85,1.05),
      col:tox?COL.toxic:(Math.random()<0.5?COL.blood:COL.bloodHot)});
  }
}
function spawnDust(x,y){ for(let i=0;i<8;i++) dust.push({x,y,vx:rnd(-70,70),vy:rnd(-20,-70),life:rnd(.25,.5),max:.5,r:rnd(3,7)}); }
function addDecal(x,y,r,col){ decals.push({x,y,r,col,a:.85}); if(decals.length>40) decals.shift(); }
function addDmg(x,y,val,big){ dmgNums.push({x,y,val,life:.9,max:.9,big,vx:rnd(-14,14),vy:-46}); }

function shake(m,d){ shakeMag=Math.max(shakeMag,m); shakeT=d; shakeDur=d; }

function hit(dmg){
  if(!ready||!z.alive) return;
  const dir=z.facing, t=toScreen(CENT.torso.x,CENT.torso.y);
  addDmg(t.x+rnd(-8,8),t.y-10,dmg,dmg>=100);
  if(z.hp-dmg>0){
    z.hp-=dmg;
    flash=0.9; hitstop=Math.max(hitstop,0.05); shake(6,0.22);
    z.kbvx+=dir*150; z.sx=1.2; z.sy=0.82;
    spawnBlood(t.x,t.y,dir,16,130);
  } else { z.hp-=dmg; die(dir); }
  updateHp();
}

function die(dir){
  z.alive=false; z.walking=false; walkBtn.classList.remove('on');
  flash=1; vignette=1; hitstop=Math.max(hitstop,0.13); shake(16,0.55);
  const F=TUNE.force;
  const spec={
    head:      {vx:dir*rnd(40,90),   vy:-rnd(300,380), vr:rnd(6,12)*dir},
    torso:     {vx:-dir*rnd(70,150),  vy:-rnd(200,280), vr:rnd(-5,5)},
    arm_front: {vx:dir*rnd(120,220),  vy:-rnd(180,260), vr:rnd(8,16)*dir},
    leg_left:  {vx:-rnd(40,130),      vy:-rnd(130,210), vr:rnd(-10,-3)},
    leg_right: {vx: rnd(40,130),      vy:-rnd(130,210), vr:rnd(3,10)},
  };
  for(const n of PART_NAMES){
    const c=toScreen(CENT[n].x,CENT[n].y), s=spec[n];
    parts.push({name:n, x:c.x, y:c.y, vx:s.vx*F, vy:s.vy*F, rot:0, vrot:s.vr,
      grav:TUNE.gravity*rnd(0.92,1.06), bounced:0, rest:false, facing:z.facing});
  }
  for(const p of [PIV.neck,PIV.shoulder,PIV.hipL,PIV.hipR,{x:CENT.torso.x,y:658}]){
    const sp=toScreen(p.x,p.y); spawnBlood(sp.x,sp.y,dir,16,220);
  }
  addDecal(z.x+z.kbx,GROUND_Y,34,COL.bloodDark);
  z.kbvx+=dir*200; updateHp();
}

function toggleWalk(){ if(!z.alive) return; z.walking=!z.walking; walkBtn.classList.toggle('on',z.walking); }
function reset(){
  Object.assign(z,{x:150,hp:100,alive:true,walking:false,facing:1,phase:0,sx:1,sy:1,bobY:0,lean:0,
    breathe:0,kbx:0,kbvx:0,legLA:0,legRA:0,headA:0,armA:0});
  particles=[]; dmgNums=[]; dust=[]; parts=[]; decals=decals.slice(-5);
  flash=0; vignette=0; shakeMag=0; hitstop=0; walkBtn.classList.remove('on'); updateHp();
}
function updateHp(){ hpEl.textContent='HP: '+Math.max(0,Math.round(z.hp)); }
canvas.addEventListener('pointerdown',()=>hit(25));

function update(dt){
  if(hitstop>0){ hitstop-=dt; return; }
  if(z.alive){
    z.kbvx+=(-z.kbx*90-z.kbvx*12)*dt; z.kbx+=z.kbvx*dt;
    z.breathe=Math.sin(performance.now()/520)*0.03;
    z.sx=damp(z.sx,1,14,dt); z.sy=damp(z.sy,1+z.breathe,14,dt);
    if(z.walking){
      z.phase+=TUNE.walkSpeed*dt;
      z.legLA=Math.sin(z.phase)*TUNE.legSwing;
      z.legRA=-Math.sin(z.phase)*TUNE.legSwing;
      z.armA=Math.sin(z.phase)*TUNE.armSwing;
      z.bobY=-Math.abs(Math.sin(z.phase))*7;
      z.lean=z.facing*5; z.headA=Math.sin(z.phase)*4;
      z.x+=z.facing*70*dt;
      if(z.x>canvas.width-70){ z.facing=-1; } else if(z.x<70){ z.facing=1; }
    } else {
      z.legLA=damp(z.legLA,0,10,dt); z.legRA=damp(z.legRA,0,10,dt);
      z.armA=damp(z.armA,Math.sin(performance.now()/900)*2,8,dt);
      z.bobY=damp(z.bobY,Math.sin(performance.now()/700)*1.5,8,dt);
      z.lean=damp(z.lean,0,8,dt); z.headA=damp(z.headA,0,8,dt);
    }
  }
  for(const g of parts){
    if(g.rest) continue;
    g.vy+=g.grav*dt; g.x+=g.vx*dt; g.y+=g.vy*dt; g.rot+=g.vrot*dt;
    if(g.y>=GROUND_Y){
      g.y=GROUND_Y;
      if(g.bounced<2 && Math.abs(g.vy)>60){ g.vy*=-0.4; g.vx*=0.6; g.vrot*=0.5; g.bounced++; addDecal(g.x,GROUND_Y,16,COL.bloodDark); }
      else { g.vy=0; g.vx*=0.7; g.vrot*=0.6; if(Math.abs(g.vx)<4&&Math.abs(g.vrot)<0.4){ g.rest=true; g.vx=0; g.vrot=0; } }
    }
  }
  for(let i=particles.length-1;i>=0;i--){ const p=particles[i];
    p.vy+=p.grav*dt; p.x+=p.vx*dt; p.y+=p.vy*dt; p.life-=dt;
    if(p.y>=GROUND_Y){ addDecal(p.x,GROUND_Y,p.r*rnd(1.1,1.8),Math.random()<0.12?COL.toxic:COL.blood); particles.splice(i,1); continue; }
    if(p.life<=0) particles.splice(i,1);
  }
  for(let i=dust.length-1;i>=0;i--){ const d=dust[i]; d.vy+=200*dt; d.x+=d.vx*dt; d.y+=d.vy*dt; d.life-=dt; if(d.life<=0) dust.splice(i,1); }
  for(let i=dmgNums.length-1;i>=0;i--){ const n=dmgNums[i]; n.vy+=40*dt; n.x+=n.vx*dt; n.y+=n.vy*dt; n.life-=dt; if(n.life<=0) dmgNums.splice(i,1); }
  if(shakeT>0){ shakeT-=dt; shakeMag=shakeMag*(shakeT/shakeDur); if(shakeT<=0) shakeMag=0; }
  flash=Math.max(0,flash-dt*7); vignette=Math.max(0,vignette-dt*2.2);
}

function drawPart(src,name,pivot,angleDeg){
  ctx.save();
  if(pivot&&angleDeg){ ctx.translate(pivot.x,pivot.y); ctx.rotate(angleDeg*D2R); ctx.translate(-pivot.x,-pivot.y); }
  ctx.drawImage(src[name],0,0);
  ctx.restore();
}
function drawRig(useMask){
  const src=useMask?mask:img;
  ctx.save();
  ctx.translate(z.x+z.kbx, GROUND_Y+z.bobY);
  ctx.scale(z.facing*z.sx, z.sy);
  ctx.rotate(z.lean*D2R);
  ctx.scale(S,S);
  ctx.translate(-ANCHOR.x,-ANCHOR.y);
  drawPart(src,'leg_left',PIV.hipL,z.legLA);
  drawPart(src,'torso',null,0);
  drawPart(src,'head',PIV.neck,z.headA);
  drawPart(src,'leg_right',PIV.hipR,z.legRA);
  drawPart(src,'arm_front',PIV.shoulder,z.armA);
  ctx.restore();
}
function drawGib(g){
  ctx.save();
  ctx.translate(g.x,g.y); ctx.rotate(g.rot); ctx.scale(g.facing*S,S);
  ctx.translate(-CENT[g.name].x,-CENT[g.name].y);
  ctx.drawImage(img[g.name],0,0);
  ctx.restore();
}

function draw(){
  ctx.clearRect(0,0,canvas.width,canvas.height);
  const shx=shakeMag?rnd(-shakeMag,shakeMag):0, shy=shakeMag?rnd(-shakeMag,shakeMag):0;
  ctx.save(); ctx.translate(shx,shy);

  ctx.strokeStyle='#243040'; ctx.lineWidth=2;
  ctx.beginPath(); ctx.moveTo(0,GROUND_Y+0.5); ctx.lineTo(canvas.width,GROUND_Y+0.5); ctx.stroke();

  for(const d of decals){ ctx.globalAlpha=d.a; ctx.fillStyle=d.col;
    ctx.beginPath(); ctx.ellipse(d.x,d.y,d.r,d.r*0.4,0,0,7); ctx.fill(); }
  ctx.globalAlpha=1;

  const shw=48*(0.7+z.sx*0.3);
  ctx.fillStyle=COL.shadow; ctx.beginPath(); ctx.ellipse(z.x+z.kbx,GROUND_Y,shw,9,0,0,7); ctx.fill();

  for(const d of dust){ ctx.globalAlpha=clamp(d.life/d.max,0,1)*0.5; ctx.fillStyle='#6b7280';
    ctx.beginPath(); ctx.arc(d.x,d.y,d.r,0,7); ctx.fill(); }
  ctx.globalAlpha=1;

  if(ready&&z.alive){
    drawRig(false);
    if(flash>0){ ctx.globalAlpha=flash; drawRig(true); ctx.globalAlpha=1; }
  }
  if(ready) for(const g of parts) drawGib(g);

  for(const p of particles){ ctx.globalAlpha=clamp(p.life/p.max,0,1); ctx.fillStyle=p.col;
    ctx.beginPath(); ctx.arc(p.x,p.y,p.r,0,7); ctx.fill(); }
  ctx.globalAlpha=1;

  for(const n of dmgNums){ ctx.globalAlpha=clamp(n.life/n.max,0,1);
    ctx.fillStyle=n.big?'#ff5252':'#ffd24a';
    ctx.font=(n.big?700:600)+' '+(n.big?26:18)+'px system-ui,sans-serif'; ctx.textAlign='center';
    ctx.fillText('-'+n.val,n.x,n.y); }
  ctx.globalAlpha=1;

  ctx.restore();

  if(vignette>0){
    const g=ctx.createRadialGradient(canvas.width/2,canvas.height/2,canvas.height*0.3,
      canvas.width/2,canvas.height/2,canvas.height*0.75);
    g.addColorStop(0,'rgba(200,20,20,0)'); g.addColorStop(1,'rgba(150,0,0,'+(0.45*vignette).toFixed(3)+')');
    ctx.fillStyle=g; ctx.fillRect(0,0,canvas.width,canvas.height);
  }
}

let last=0;
function loop(now){ const dt=last?Math.min(0.033,(now-last)/1000):0; last=now; update(dt); draw(); requestAnimationFrame(loop); }
requestAnimationFrame(loop);
window.game={reset,toggleWalk,hit};
</script>
</body>
</html>
