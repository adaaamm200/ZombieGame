<!DOCTYPE html>
<html lang="hu">
<head>
<meta charset="UTF-8">
<title>Zombi Kronika - Sprite Rig teszt</title>
<style>
  body { background: #0d1117; color: #e6e6e6; font-family: sans-serif; display: flex; flex-direction: column; align-items: center; gap: 16px; padding: 24px; }
  canvas { background: #1a1f2b; border: 1px solid #333; }
  button { padding: 8px 16px; margin: 0 4px; cursor: pointer; }
</style>
</head>
<body>
  <h2>Sprite Rig teszt - helyezd ide a kobor_parts mappát a slice_sprite.py futtatása után</h2>
  <div>
    <button onclick="rig && rig.setState('idle')">Idle</button>
    <button onclick="rig && rig.setState('walk')">Séta</button>
    <button onclick="rig && rig.setState('hurt')">Találat</button>
    <button onclick="rig && rig.setState('death')">Halál</button>
  </div>
  <canvas id="game" width="400" height="300"></canvas>
  <p id="status">Betöltés...</p>

  <script src="sprite-rig.js"></script>
  <script>
    const canvas = document.getElementById('game');
    const ctx = canvas.getContext('2d');
    const statusEl = document.getElementById('status');
    let rig = null;
    let lastTime = 0;

    async function init() {
      try {
        rig = new SpriteRig(ctx, './kobor_parts/');
        await rig.load('kobor_rig.json');
        rig.setState('idle');
        statusEl.textContent = 'Betöltve. Kattints a gombokra.';
        requestAnimationFrame(loop);
      } catch (err) {
        statusEl.textContent = 'Hiba: nem találom a ./kobor_parts/kobor_rig.json fájlt. Futtasd le a slice_sprite.py-t, és tedd ide a kimeneti mappát.';
        console.error(err);
      }
    }

    function loop(now) {
      const dt = lastTime ? (now - lastTime) / 1000 : 0;
      lastTime = now;
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      const groundY = 260;
      ctx.strokeStyle = '#333';
      ctx.beginPath();
      ctx.moveTo(0, groundY);
      ctx.lineTo(canvas.width, groundY);
      ctx.stroke();
      rig.update(dt);
      rig.draw(200, groundY, 1);
      requestAnimationFrame(loop);
    }

    init();
  </script>
</body>
</html>
