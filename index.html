<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover" />
  <title>ZombieChronicles</title>
  <meta name="description" content="ZombieChronicles — a zombie survival arcade game. Personal use." />
  <meta name="theme-color" content="#0a0f0a" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="ZombieChronicles" />
  <link rel="manifest" href="manifest.webmanifest" />
  <link rel="icon" href="icons/icon-180.png" />
  <link rel="apple-touch-icon" href="icons/icon-180.png" />
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>
  <div id="app">
    <!-- Stage: a játék-viewport — canvas, HUD, gombok, menük EGY rendszerben -->
    <div id="stage">
    <canvas id="cv" width="960" height="540"></canvas>

    <!-- Játék közbeni HUD -->
    <div id="hud" class="hidden">
      <div id="hud-top">
        <div id="hpwrap"><div id="hpbar"></div><div id="hpseg"></div><span id="hptext"></span></div>
        <div id="waveinfo"><div id="wavebar"><div id="wavefill"></div></div><span id="wavetext"></span></div>
        <div id="coininfo"><svg class="ui-ic coin-ic" viewBox="0 0 24 24" width="1em" height="1em"><circle cx="12" cy="12" r="9" fill="#ffcf4d"/><circle cx="12" cy="12" r="9" fill="none" stroke="rgba(0,0,0,.35)" stroke-width="1.4"/><path d="M9.4 9.2a3.4 3.4 0 100 5.6M8.2 12h3.4" fill="none" stroke="rgba(60,40,0,.75)" stroke-width="1.7" stroke-linecap="round"/></svg> <span id="coincount">0</span></div>
        <button id="btn-pause" class="hudbtn" aria-label="Pause"><svg viewBox="0 0 24 24" width="1em" height="1em" fill="currentColor"><rect x="6.5" y="5" width="3.5" height="14" rx="1"/><rect x="14" y="5" width="3.5" height="14" rx="1"/></svg></button>
      </div>
      <div id="weaponchip">
        <img id="weaponicon" alt="" />
        <div class="wc-text">
          <span id="weaponname"></span>
          <span id="ammocount"></span>
        </div>
      </div>
    </div>

    <!-- Érintéses irányítás -->
    <div id="controls" class="hidden">
      <div id="joyzone"><div id="joybase"><div id="joyknob"></div></div></div>
      <div id="btnzone">
        <button id="btn-ammo" class="ctlbtn small" aria-label="Buy ammo"><svg viewBox="0 0 24 24" width="1em" height="1em" fill="none" stroke="currentColor" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round"><path d="M4 8.5L12 5l8 3.5v7L12 19l-8-3.5z"/><path d="M4 8.5l8 3.5 8-3.5M12 12v7"/></svg><em id="ammoprice"></em></button>
        <button id="btn-swap" class="ctlbtn small" aria-label="Swap weapon"><svg viewBox="0 0 24 24" width="1em" height="1em" fill="none" stroke="currentColor" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round"><path d="M4 8h13l-3-3M20 16H7l3 3"/></svg></button>
        <button id="btn-gren" class="ctlbtn small" aria-label="Grenade"><svg viewBox="0 0 24 24" width="1em" height="1em" fill="none" stroke="currentColor" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="14" r="6"/><path d="M9.5 8.5l1.5-1.5h2l1.5 1.5M14.5 6.5l2-2 1.5 1.5-2 2M12 5.5V7"/></svg><em id="grencount"></em></button>
        <button id="btn-fire" class="ctlbtn big" aria-label="Fire"><svg viewBox="0 0 24 24" width="1em" height="1em" fill="currentColor"><path d="M12 2.4c1.6 3 .3 4.8-.9 6.2-1.3 1.5-2.7 3-2.7 5.4A4.6 4.6 0 0012 18.6a4.6 4.6 0 003.6-7.4c-.6-.9-1.3-1.6-1.3-2.7 0-.9.4-1.7.4-1.7s-2 .6-2.7 2.2c-.5-1.5.4-4.6 0-6.6z"/></svg></button>
      </div>
    </div>

    <!-- Menü képernyők (a js/ui.js tölti fel) -->
    <div id="screens"></div>
    </div><!-- /stage -->

    <div id="rotate-note">Rotate your device to landscape · Fordítsd fekvő módba</div>
  </div>

  <script src="js/const.js"></script>
  <script src="js/save.js"></script>
  <script src="js/i18n.js"></script>
  <script src="js/icons.js"></script>
  <script src="js/audio.js"></script>
  <script src="js/sprites.js"></script>
  <script src="js/input.js"></script>
  <script src="js/game.js"></script>
  <script src="js/ui.js"></script>
  <script src="js/main.js"></script>
</body>
</html>
