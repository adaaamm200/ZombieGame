<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover" />
  <title>ZombieChronicles</title>
  <meta name="description" content="ZombieChronicles — a zombie survival arcade game. Personal use." />
  <meta name="theme-color" content="#0a0f0a" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="ZombieChronicles" />
  <link rel="manifest" href="manifest.webmanifest" />
  <link rel="icon" href="assets/ui/appicon.png" />
  <link rel="apple-touch-icon" href="assets/ui/appicon.png" />
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>
  <div id="app">
    <!-- Stage: a játék-viewport — canvas, HUD, gombok, menük EGY rendszerben -->
    <div id="stage">
    <canvas id="cv" width="960" height="540"></canvas>

    <!-- Játék közbeni HUD -->
    <div id="hud" class="hidden">
      <div id="hud-top">
        <div id="hpwrap"><div id="hpbar"></div><div id="hpseg"></div><span id="hptext"></span></div>
        <div id="waveinfo"><div id="wavebar"><div id="wavefill"></div></div><span id="wavetext"></span></div>
        <div id="coininfo"><img class="coin-img" src="assets/ui/ic-coin.png" alt="" /> <span id="coincount">0</span></div>
        <button id="btn-pause" class="hudbtn" aria-label="Pause"><img src="assets/ui/ic-pause.png" alt="" /></button>
      </div>
      <div id="weaponchip">
        <img id="weaponicon" alt="" />
        <div class="wc-text">
          <span id="weaponname"></span>
          <span id="ammocount"></span>
        </div>
        <div id="reloadwrap"><div id="reloadfill"></div><span id="reloadlbl">RELOAD</span></div>
      </div>
    </div>

    <!-- Érintéses irányítás -->
    <div id="controls" class="hidden">
      <div id="joyzone"><div id="joybase"><div id="joyknob"></div></div></div>
      <div id="btnzone">
        <div class="btn-col">
          <button id="btn-swap" class="ctlbtn small" aria-label="Swap weapon"><img src="assets/ui/ic-swap.png" alt="" /></button>
          <button id="btn-gren" class="ctlbtn small" aria-label="Grenade"><img src="assets/ui/ic-grenade.png" alt="" /><em id="grencount"></em></button>
        </div>
        <div class="btn-col">
          <button id="btn-ammo" class="ctlbtn small" aria-label="Buy ammo"><img src="assets/ui/ic-ammo.png" alt="" /><em id="ammoprice"></em></button>
          <button id="btn-fire" class="ctlbtn big" aria-label="Fire"><img src="assets/ui/ic-fire.png" alt="" /></button>
        </div>
      </div>
    </div>

    </div><!-- /stage -->

    <!-- Menü / board / bolt képernyők: a #stage 16:9 dobozán KÍVÜL, TELJES viewportot
         kitöltő modern fullscreen-mobile felület (safe-area aware). A gameplay
         (canvas + HUD + touch-gombok) marad a #stage-ben, 16:9 arányban. -->
    <div id="screens"></div>

    <div id="rotate-note">Rotate your device to landscape · Fordítsd fekvő módba</div>
  </div>

  <script src="js/const.js"></script>
  <script src="js/save.js"></script>
  <script src="js/i18n.js"></script>
  <script src="js/icons.js"></script>
  <script src="js/audio.js"></script>
  <script src="js/sprites.js"></script>
  <script src="js/input.js"></script>
  <script src="js/game.js"></script>
  <script src="js/ui.js"></script>
  <script src="js/main.js"></script>
</body>
</html>
